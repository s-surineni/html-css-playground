<style>
    .tooltip-wrapper { position: relative; display: inline-block; }
    .tooltip {
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%) translateY(4px);
        background: #111;
        color: #fff;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1.2;
        white-space: nowrap;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity .15s ease, transform .15s ease, visibility .15s ease;
        z-index: 10;
    }
    .tooltip::after {
        content: "";
        position: absolute;
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
        border: 6px solid transparent;
        border-bottom-color: #111;
    }
    .tooltip-wrapper:hover .tooltip,
    .tooltip-wrapper:focus-within .tooltip {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }
    button { cursor: pointer; }
</style>

<div class="tooltip-wrapper">
    <button type="button" aria-describedby="tip1">Hover me</button>
    <span id="tip1" role="tooltip" class="tooltip">This is a tooltip</span>
</div>
